# ═══════════════════════════════════════════════════════════════════
# ELAMS — GitHub Actions CI/CD Pipeline
# Version: 1.0.0
# SCM Tool: GitHub Actions
#
# GitOps Flow:
#   feature/* branch → PR → develop → PR → main → auto deploy
#
# Pipeline stages:
#   1. Lint & Validate
#   2. Install Dependencies
#   3. Run Tests (Jest)
#   4. Build Check
#   5. Security Audit
#   6. Deploy (on main branch)
# ═══════════════════════════════════════════════════════════════════

name: 🚀 ELAMS CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

# Cancel previous runs on same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── JOB 1: Code Quality & Lint ────────────────────────────────────────────
  lint:
    name: 🔍 Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: 📦 Install Dependencies
        run: |
          cd server
          npm ci

      - name: 🔍 Check for syntax errors
        run: |
          cd server
          node --check index.js
          node --check routes/auth.js
          node --check routes/leave.js
          node --check routes/attendance.js
          node --check routes/employee.js
          node --check middleware/auth.js
          echo "✅ Syntax check passed"

      - name: 📄 Validate package.json
        run: |
          cd server
          node -e "JSON.parse(require('fs').readFileSync('package.json'))"
          echo "✅ package.json is valid"

  # ─── JOB 2: Automated Tests ────────────────────────────────────────────────
  test:
    name: 🧪 Run Test Suite
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: 📦 Install Dependencies
        run: |
          cd server
          npm ci

      - name: 🧪 Run Jest Tests
        run: |
          cd server
          npm run test:ci
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_key_for_ci_pipeline

      - name: 📊 Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: matrix.node-version == 20
        with:
          name: coverage-report
          path: server/coverage/
          retention-days: 14

  # ─── JOB 3: Security Audit ─────────────────────────────────────────────────
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: 📦 Install Dependencies
        run: |
          cd server
          npm ci

      - name: 🔒 Run NPM Audit
        run: |
          cd server
          npm audit --audit-level=high || echo "⚠️ Audit warnings found - review before production"

  # ─── JOB 4: Build Validation ───────────────────────────────────────────────
  build:
    name: 🏗️ Build Validation
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: 📦 Install Server Dependencies
        run: |
          cd server
          npm ci --production

      - name: ✅ Verify Application Starts
        run: |
          cd server
          timeout 10 node index.js &
          sleep 5
          curl -f http://localhost:5000/api/health || (echo "Health check failed!" && exit 1)
          echo "✅ Application health check passed"
        env:
          NODE_ENV: production
          PORT: 5000
          JWT_SECRET: build_test_secret

      - name: 📁 Validate Frontend
        run: |
          test -f client/index.html && echo "✅ Frontend index.html exists"
          echo "✅ Frontend build validation passed"

      - name: 🏷️ Create Build Artifact
        run: |
          echo "Build: ${{ github.sha }}" > build-info.txt
          echo "Branch: ${{ github.ref_name }}" >> build-info.txt
          echo "Time: $(date -u)" >> build-info.txt
          echo "Version: 1.0.0" >> build-info.txt
          cat build-info.txt

      - name: 📦 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: build-info.txt
          retention-days: 30

  # ─── JOB 5: Create Release (on version tags) ───────────────────────────────
  release:
    name: 🏷️ Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, security]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📋 Extract Changelog
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Creating release for $VERSION"

      - name: 🚀 Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: ELAMS ${{ steps.changelog.outputs.version }}
          body: |
            ## 🚀 ELAMS Release ${{ steps.changelog.outputs.version }}

            ### What's in this release
            See [CHANGELOG.md](./CHANGELOG.md) for full details.

            ### Setup
            ```bash
            git clone <repo-url>
            cd elams/server && npm install
            cp .env.example .env  # configure environment
            npm start
            ```
          draft: false
          prerelease: false

  # ─── JOB 6: Deploy to Production (main branch only) ────────────────────────
  deploy:
    name: 🌐 Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: ${{ steps.deploy-backend.outputs.url }}

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🚀 Deploy Backend to Render
        id: deploy-backend
        run: |
          echo "🚀 Deploying backend to Render..."
          # Render auto-deploys from main branch when connected
          # To trigger manually: curl -X POST $RENDER_DEPLOY_HOOK_URL
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
            echo "✅ Render deploy triggered"
          else
            echo "ℹ️ RENDER_DEPLOY_HOOK_URL not set – skipping backend deploy trigger"
          fi
          echo "url=https://elams-api.onrender.com" >> $GITHUB_OUTPUT

      - name: 🌐 Deploy Frontend to Netlify
        run: |
          echo "🌐 Deploying frontend to Netlify..."
          if [ -n "${{ secrets.NETLIFY_AUTH_TOKEN }}" ]; then
            npx netlify-cli deploy \
              --dir=client \
              --site=${{ secrets.NETLIFY_SITE_ID }} \
              --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} \
              --prod
            echo "✅ Frontend deployed to Netlify"
          else
            echo "ℹ️ Netlify secrets not set – skipping frontend deploy"
          fi

      - name: ✅ Deployment Success Notification
        run: |
          echo "═══════════════════════════════════"
          echo "🎉 ELAMS v1.0.0 Deployed!"
          echo "Backend:  https://elams-api.onrender.com"
          echo "Frontend: https://elams.netlify.app"
          echo "Commit:   ${{ github.sha }}"
          echo "Branch:   ${{ github.ref_name }}"
          echo "═══════════════════════════════════"

  # ─── Summary ───────────────────────────────────────────────────────────────
  pipeline-summary:
    name: 📊 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint, test, security, build]
    if: always()

    steps:
      - name: 📊 Print Summary
        run: |
          echo "## 🚀 ELAMS CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`v1.0.0\`" >> $GITHUB_STEP_SUMMARY
